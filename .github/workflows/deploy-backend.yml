name: Build and Push backend to ECR

on:
  push:
    branches:
      - push-backend-to-ecr
      - feat--publish-as-fargate-task
      - use-cognito
      - feat-remove-mongo-and-scheduler
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'backend/**'

# Mandatory for OIDC Federation
permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::573862273216:role/github-karli-repo
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: davideli210/karli-backend-fargate
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build the docker container
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          
          # Push it to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          # Optional: Also tag as 'latest' for easier pulling
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
      
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition default-karli-backend-fargate-3799 \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: Main
          image: ${{ steps.login-ecr.outputs.registry }}/davideli210/karli-backend-fargate:${{ github.sha }}

      - name: Deploy updated task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: karli-backend-fargate-3799
          cluster: default
          wait-for-service-stability: true