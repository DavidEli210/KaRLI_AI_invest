name: Deploy Frontend to S3

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::573862273216:role/github-oidc-deploy-role --change this to the role you want to assume
          aws-region: eu-north-1

      - name: Deploy to S3
        run: |
          aws s3 sync ./dist s3://karli-frontend-573862273216-eu-north-1-an/ \
            --delete \
            --exact-timestamps

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1WTER3TH67UMW \
            --paths "/*"